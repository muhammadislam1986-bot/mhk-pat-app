<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHK PAT Mobile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b1622;
color:white;
}

.container{
padding:20px;
}

.card{
background:#122334;
padding:20px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:none;
}

button{
padding:14px;
background:#1f4e79;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
width:100%;
}

.result{
margin-top:20px;
background:#17314a;
padding:15px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Create Job</h2>

<label>Client Name</label>
<input id="client">

<label>Site Address</label>
<textarea id="address"></textarea>

<label>Engineer</label>
<input id="engineer">

<button id="createBtn">Create Job</button>

<div id="jobResult"></div>

</div>

</div>

<script>

document.getElementById("createBtn").addEventListener("click", function(){

let client=document.getElementById("client").value;
let address=document.getElementById("address").value;
let engineer=document.getElementById("engineer").value;

if(client=="" || address==""){
alert("Please enter client name and address");
return;
}

let job={
client:client,
address:address,
engineer:engineer,
date:new Date().toLocaleDateString()
};

localStorage.setItem("current_job",JSON.stringify(job));

document.getElementById("jobResult").innerHTML=
"<div class='result'>"+
"<h3>Job Created Successfully</h3>"+
"<p><b>Client:</b> "+job.client+"</p>"+
"<p><b>Address:</b> "+job.address+"</p>"+
"<p><b>Engineer:</b> "+job.engineer+"</p>"+
"<p><b>Date:</b> "+job.date+"</p>"+
"</div>";

});

</script>

</body>
</html>
