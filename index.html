<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHK PAT Pro V4</title>
<meta name="theme-color" content="#153553">
<style>
body{font-family:Arial;margin:0;background:#0b1e33;color:white}
header{background:#153553;padding:20px;text-align:center}
h1{margin:0}
.subtitle{font-size:14px;opacity:.9}
nav{position:fixed;bottom:0;width:100%;background:#10263c;display:flex;justify-content:space-around;padding:12px 0}
nav div{font-size:14px}
.container{padding:20px;margin-bottom:80px}
.card{background:#17314d;padding:15px;border-radius:10px;margin-bottom:15px}
label{display:block;margin-top:10px;font-size:13px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:none}
button{margin-top:15px;padding:12px;background:#3f7fb8;color:white;border:none;border-radius:6px;width:100%}
</style>
</head>

<body>

<header>
<h1>MHK Building Solutions Ltd</h1>
<div class="subtitle">Portable Appliance Testing (PAT)</div>
</header>

<div class="container">

<div class="card">
<h3>Create Job</h3>
<label>Client</label>
<input placeholder="Client name">
<label>Site Address</label>
<input placeholder="Address">
<label>Test Date</label>
<input type="date">
<button>Create Job</button>
</div>

<div class="card">
<h3>Add Appliance</h3>

<label>Appliance</label>
<select>
<option>Kettle</option>
<option>Microwave</option>
<option>Toaster</option>
<option>Extension Lead</option>
<option>Printer</option>
<option>Router</option>
<option>Monitor</option>
<option>Fan Heater</option>
<option>Vacuum Cleaner</option>
<option>Other</option>
</select>

<label>Asset Number</label>
<input placeholder="Auto e.g. KTL01">

<label>Location</label>
<input placeholder="Room / Area">

<label>Fuse</label>
<select>
<option>1A</option>
<option>3A</option>
<option>5A</option>
<option>7A</option>
<option>10A</option>
<option>13A</option>
<option>Other</option>
</select>

<label>Insulation Resistance</label>
<select>
<option>>200 MΩ</option>
<option>>100 MΩ</option>
<option>>50 MΩ</option>
<option>>20 MΩ</option>
<option>>10 MΩ</option>
<option>>2 MΩ</option>
<option>Manual</option>
</select>

<button>Save Appliance</button>
<button>Print Label</button>

</div>

</div>

<nav>
<div>Jobs</div>
<div>Clients</div>
<div>Items</div>
<div>Labels</div>
<div>Report</div>
<div>Settings</div>
</nav>

</body>
</html>
